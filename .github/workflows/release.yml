name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional, e.g. v0.2.2). If omitted, an automated canary pre-release will be created."
        required: false
        type: string


permissions:
  contents: write

jobs:
  preflight:
    name: No-build release preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout Opaline submodule
        run: |
          git submodule sync opaline
          git submodule update --init --depth=1 opaline

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Release pipeline preflight
        run: node scripts/release/preflight.mjs

  package:
    name: Package ${{ matrix.platform }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            target: --mac dmg zip
          - platform: windows
            os: windows-latest
            target: --win nsis portable zip
          - platform: linux
            os: ubuntu-latest
            target: --linux AppImage deb tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout Opaline submodule
        run: |
          git submodule sync opaline
          git submodule update --init --depth=1 opaline

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify app
        run: pnpm turbo run typecheck test --filter=@construct/app

      - name: Generate icons
        run: node scripts/release/generate-icons.mjs

      - name: Build app
        run: pnpm turbo run build --filter=@construct/app

      - name: Calculate Release Tag
        id: release
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            # Calculate dynamic pre-release version
            BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
            DATE_STR=$(node -e "const d = new Date(); console.log(d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0'))")
            SHA_SHORT=$(git rev-parse --short HEAD)
            NEW_VERSION="${BASE_VERSION}-canary.${DATE_STR}.${SHA_SHORT}"
            TAG="v${NEW_VERSION}"
            
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            
            # Update version in package.json files
            node -e "
              const fs = require('fs');
              const newVer = '${NEW_VERSION}';
              ['package.json', 'app/package.json'].forEach(p => {
                const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                pkg.version = newVer;
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              });
            "
            echo "Updated package.json files to version ${NEW_VERSION}"
          else
            # For tag push or manual dispatch with tag
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
            VERSION="${TAG#v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when macOS signing is not configured
        if: matrix.platform == 'macos'
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          if [ -z "$CSC_LINK" ] || [ -z "$CSC_KEY_PASSWORD" ]; then
            echo "::warning title=macOS signing certificate missing::MACOS_CERTIFICATE and MACOS_CERTIFICATE_PASSWORD are not configured, so the macOS app will be ad-hoc signed and Gatekeeper may report it as damaged."
          fi
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::warning title=macOS notarization credentials missing::APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID are not fully configured, so the macOS app may not be notarized."
          fi

      - name: Package desktop
        working-directory: app
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$CSC_LINK" ]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
          if [ -z "$APPLE_ID" ]; then unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; fi
          pnpm exec electron-builder --projectDir . --config electron-builder.yml ${{ matrix.target }}


      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: construct-${{ matrix.platform }}
          path: |
            app/release/*/*.dmg
            app/release/*/*.zip
            app/release/*/*.exe
            app/release/*/*.msi
            app/release/*/*.AppImage
            app/release/*/*.deb
            app/release/*/*.rpm
            app/release/*/*.snap
            app/release/*/*.pkg
            app/release/*/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Calculate Release Tag
        id: release
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            # Calculate dynamic pre-release version
            BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
            DATE_STR=$(node -e "const d = new Date(); console.log(d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0'))")
            SHA_SHORT=$(git rev-parse --short HEAD)
            NEW_VERSION="${BASE_VERSION}-canary.${DATE_STR}.${SHA_SHORT}"
            TAG="v${NEW_VERSION}"
            
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # For tag push or manual dispatch with tag
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
            VERSION="${TAG#v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          RELEASE_ARTIFACT_DIR: release-artifacts
        run: node scripts/release/publish-gh.mjs
