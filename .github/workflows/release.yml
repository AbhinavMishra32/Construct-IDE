name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional, e.g. v0.2.2). If omitted, an automated canary pre-release will be created."
        required: false
        type: string


permissions:
  contents: write

jobs:
  preflight:
    name: No-build release preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout Opaline submodule
        run: |
          git submodule sync opaline
          git submodule update --init --depth=1 opaline

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Release pipeline preflight
        run: node scripts/release/preflight.mjs

  package:
    name: Package ${{ matrix.platform }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout Opaline submodule
        run: |
          git submodule sync opaline
          git submodule update --init --depth=1 opaline

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libsoup-3.0-dev

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify app
        run: pnpm turbo run typecheck test --filter=@construct/app

      - name: Calculate Release Tag
        id: release
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            # Calculate dynamic pre-release version
            BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
            DATE_STR=$(node -e "const d = new Date(); console.log(d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0'))")
            SHA_SHORT=$(git rev-parse --short HEAD)
            NEW_VERSION="${BASE_VERSION}-canary.${DATE_STR}.${SHA_SHORT}"
            TAG="v${NEW_VERSION}"

            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            # Update every package manifest Tauri uses for a coherent canary version.
            node -e "
              const fs = require('fs');
              const newVer = '${NEW_VERSION}';
              ['package.json', 'app/package.json'].forEach(p => {
                const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                pkg.version = newVer;
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              });
              const conf = 'app/src-tauri/tauri.conf.json';
              const tc = JSON.parse(fs.readFileSync(conf, 'utf8'));
              tc.version = newVer;
              fs.writeFileSync(conf, JSON.stringify(tc, null, 2) + '\n');
              const cargo = 'app/src-tauri/Cargo.toml';
              const cargoSource = fs.readFileSync(cargo, 'utf8');
              const nextCargoSource = cargoSource.replace(/^version = ".*"$/m, 'version = "' + newVer + '"');
              if (nextCargoSource === cargoSource) throw new Error('Could not update app/src-tauri/Cargo.toml version.');
              fs.writeFileSync(cargo, nextCargoSource);
            "
            echo "Updated package.json, Cargo.toml, and tauri.conf.json to version ${NEW_VERSION}"
          else
            # For tag push or manual dispatch with tag
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
            VERSION="${TAG#v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when macOS signing is not configured
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        shell: bash
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning title=macOS signing certificate missing::MACOS_CERTIFICATE is not configured, so the macOS app will be ad-hoc signed and Gatekeeper may report it as damaged."
          fi
          if [ -z "$APPLE_ID" ]; then
            echo "::warning title=macOS notarization credentials missing::APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID are not fully configured, so the macOS app may not be notarized."
          fi

      - name: Package desktop (Tauri)
        working-directory: app
        shell: bash
        env:
          # Use neutral names here: Tauri treats its signing variables as enabled
          # when they exist, even if GitHub supplied an empty secret value.
          MACOS_CERTIFICATE_INPUT: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD_INPUT: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY_INPUT: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          MACOS_APPLE_ID_INPUT: ${{ secrets.APPLE_ID }}
          MACOS_APPLE_PASSWORD_INPUT: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACOS_TEAM_ID_INPUT: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MACOS_CERTIFICATE_INPUT" ]; then
            export APPLE_CERTIFICATE="$MACOS_CERTIFICATE_INPUT"
            export APPLE_CERTIFICATE_PASSWORD="$MACOS_CERTIFICATE_PASSWORD_INPUT"
            export APPLE_SIGNING_IDENTITY="$MACOS_SIGNING_IDENTITY_INPUT"
            export APPLE_ID="$MACOS_APPLE_ID_INPUT"
            export APPLE_PASSWORD="$MACOS_APPLE_PASSWORD_INPUT"
            export APPLE_TEAM_ID="$MACOS_TEAM_ID_INPUT"
          fi
          pnpm tauri build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v5
        with:
          name: construct-${{ matrix.platform }}
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app.tar.gz
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/deb/*.deb
            app/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Calculate Release Tag
        id: release
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            # Calculate dynamic pre-release version
            BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
            DATE_STR=$(node -e "const d = new Date(); console.log(d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0'))")
            SHA_SHORT=$(git rev-parse --short HEAD)
            NEW_VERSION="${BASE_VERSION}-canary.${DATE_STR}.${SHA_SHORT}"
            TAG="v${NEW_VERSION}"

            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # For tag push or manual dispatch with tag
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
            VERSION="${TAG#v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
          RELEASE_ARTIFACT_DIR: release-artifacts
        run: node scripts/release/publish-gh.mjs
