name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (optional, e.g. v0.2.2). If omitted, an automated canary pre-release will be created."
        required: false
        type: string


permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            target: --mac dmg zip
          - platform: windows
            os: windows-latest
            target: --win nsis portable zip
          - platform: linux
            os: ubuntu-latest
            target: --linux AppImage deb tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive


      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify app
        run: pnpm --filter @construct/app typecheck && pnpm --filter @construct/app test

      - name: Generate icons
        run: node scripts/release/generate-icons.mjs

      - name: Calculate Release Tag
        id: release
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            # Calculate dynamic pre-release version
            BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
            DATE_STR=$(node -e "const d = new Date(); console.log(d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0'))")
            SHA_SHORT=$(git rev-parse --short HEAD)
            NEW_VERSION="${BASE_VERSION}-canary.${DATE_STR}.${SHA_SHORT}"
            TAG="v${NEW_VERSION}"
            
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            
            # Update version in package.json files
            node -e "
              const fs = require('fs');
              const newVer = '${NEW_VERSION}';
              ['package.json', 'app/package.json'].forEach(p => {
                const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                pkg.version = newVer;
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              });
            "
            echo "Updated package.json files to version ${NEW_VERSION}"
          else
            # For tag push or manual dispatch with tag
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
            VERSION="${TAG#v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package desktop
        working-directory: app
        run: pnpm build && pnpm exec electron-builder --projectDir . --config electron-builder.yml ${{ matrix.target }}


      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: construct-${{ matrix.platform }}
          path: |
            app/release/**/*.dmg
            app/release/**/*.zip
            app/release/**/*.exe
            app/release/**/*.msi
            app/release/**/*.AppImage
            app/release/**/*.deb
            app/release/**/*.rpm
            app/release/**/*.snap
            app/release/**/*.pkg
            app/release/**/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Calculate Release Tag
        id: release
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            # Calculate dynamic pre-release version
            BASE_VERSION=$(node -e "console.log(require('./package.json').version)")
            DATE_STR=$(node -e "const d = new Date(); console.log(d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, '0') + String(d.getUTCDate()).padStart(2, '0'))")
            SHA_SHORT=$(git rev-parse --short HEAD)
            NEW_VERSION="${BASE_VERSION}-canary.${DATE_STR}.${SHA_SHORT}"
            TAG="v${NEW_VERSION}"
            
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # For tag push or manual dispatch with tag
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TAG="$INPUT_TAG"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
            VERSION="${TAG#v}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          IS_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
        shell: bash
        run: |
          VERSION="${TAG#v}"
          NOTES="docs/releases/${VERSION}.md"
          
          EXTRA_FLAGS=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            EXTRA_FLAGS="--prerelease --latest=false"
          else
            EXTRA_FLAGS="--latest"
          fi
          
          # Find only files recursively inside release-artifacts (ignoring directories)
          FILES=$(find release-artifacts -type f)
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $FILES --clobber
          elif [ "$IS_PRERELEASE" = "true" ]; then
            gh release create "$TAG" $FILES $EXTRA_FLAGS --title "Construct Canary ${VERSION}" --notes "Automated canary pre-release build."
          elif [ -f "$NOTES" ]; then
            gh release create "$TAG" $FILES $EXTRA_FLAGS --title "Construct ${VERSION}" --notes-file "$NOTES"
          else
            gh release create "$TAG" $FILES $EXTRA_FLAGS --title "Construct ${VERSION}" --notes "Construct ${VERSION}"
          fi
