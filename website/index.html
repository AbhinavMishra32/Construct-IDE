<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Construct</title>
    <meta
      name="description"
      content="Construct is an AI-guided desktop IDE for learning software by building real systems."
    />
    <meta name="theme-color" content="#0d0d0f" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="coming-soon" aria-label="Construct coming soon">
      <div class="coming-soon__backdrop" aria-hidden="true">
        <span class="coming-soon__orb coming-soon__orb--north"></span>
        <span class="coming-soon__orb coming-soon__orb--east"></span>
        <span class="coming-soon__orb coming-soon__orb--south"></span>
      </div>
      <div class="coming-soon__grid" aria-hidden="true"></div>

      <div class="coming-soon__shell">
        <header class="coming-soon__toolbar">
          <button
            class="theme-toggle"
            type="button"
            aria-label="Toggle theme"
            data-theme-toggle
          >
            <span class="theme-toggle__icon" data-theme-icon>◐</span>
            <span data-theme-label>Dark</span>
          </button>
        </header>

        <section class="coming-soon__stage">
          <div class="coming-soon__copy">
            <span class="coming-soon__eyebrow">Construct</span>
            <h1 class="coming-soon__title">Coming soon.</h1>
            <p class="coming-soon__subtitle">
              AI-guided project construction for developers.
            </p>
            <p class="coming-soon__description">
              Construct is a desktop IDE where the AI prepares the path, the human
              writes the important code, and the project grows step by step.
            </p>

            <div class="coming-soon__chips" aria-label="Product highlights">
              <span class="chip">Desktop IDE</span>
              <span class="chip">Adaptive mentor</span>
              <span class="chip">Real project build paths</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
